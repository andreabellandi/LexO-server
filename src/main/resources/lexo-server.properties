application.version= 1.2.1
service.sessionTimeout=1800
helper.jsonDateFormat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
helper.jsonPrettyPrint=true
manager.operationTimestampFormat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX

repository.lexicon.namespace=http://lexica/mylexicon#
repository.lexicon.lexicalConcept.namespace=http://lexica/mylexicon/lexicalConcept#
repository.ontology.namespace=http://simpleOntology#
repository.lexicon.bibliography.namespace=http://lexica/mylexicon/bibliography#
repository.instance.id=LexO_

multimedia.image.folder=lexiconImages/

GraphDb.url=http://localhost:7200
GraphDb.repository=LexOLexica
GraphDb.size=5
# Lexical data and attestations are kept in separate named graphs. As for
# LexOTexts, their names are derived from one configurable base URI.
GraphDb.namedGraphBase=https://lexo.ilc.cnr.it/graphs/lexical/
GraphDb.lexiconNamedGraph=https://lexo.ilc.cnr.it/graphs/lexical/lexica
GraphDb.attestationNamedGraph=https://lexo.ilc.cnr.it/graphs/lexical/attestations

# Dedicated GraphDB repository for text and corpus NIF graphs. Both repositories
# are created idempotently by the startup bootstrap when they do not exist.
TextGraphDb.url=http://localhost:7200
TextGraphDb.repository=LexOTexts
TextGraphDb.namedGraphBase=https://lexo.ilc.cnr.it/graphs/nif/

# Idempotent GraphDB Free bootstrap. Repository templates, schema imports and
# Lucene connector indexes are classpath resources under src/main/resources/bootstrap.
Bootstrap.enabled=true
Bootstrap.required=true
Bootstrap.lexicon.label=LexO lexicon
Bootstrap.text.label=LexO texts
Bootstrap.lexicon.repositoryConfig=bootstrap/repositories/lexicon-repository.ttl
Bootstrap.text.repositoryConfig=bootstrap/repositories/text-repository.ttl
Bootstrap.schema.manifest=bootstrap/schema/schema-imports.json
Bootstrap.schema.baseIri=https://lexo.ilc.cnr.it/resources/
Bootstrap.indexes.manifest=bootstrap/indexes/indexes.json
Bootstrap.metadata.namedGraph=https://lexo.ilc.cnr.it/graphs/bootstrap
Bootstrap.connectTimeoutMs=10000
Bootstrap.readTimeoutMs=60000

# allowable values {label, skos, skos-xl}
skos.lexicalizationModel=skos
skos.defaultLanguageLabel=it
skos.lexicalizationModel.languages=it,en,fr

zotero.service.url=https://api.zotero.org
zotero.service.requestPrefix=groups
zotero.service.library=2552746
zotero.service.version=3

#keycloack.url=https://digitant.ilc.cnr.it/auth_demo/realms/princnr
#keycloack.client=princlient
#keycloack.freeViewer=true
